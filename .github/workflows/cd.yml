name: CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and tag image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/heart-disease-api:latest -t ghcr.io/${{ github.repository }}/heart-disease-api:${{ github.sha }} -f docker/Dockerfile .
        continue-on-error: false

      - name: Push latest image to GitHub Container Registry
        run: |
          docker push ghcr.io/${{ github.repository }}/heart-disease-api:latest
        continue-on-error: false

      - name: Push SHA-tagged image to GitHub Container Registry
        run: |
          docker push ghcr.io/${{ github.repository }}/heart-disease-api:${{ github.sha }}
        continue-on-error: false