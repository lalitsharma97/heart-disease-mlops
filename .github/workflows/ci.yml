name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Code
        run: |
          flake8 . --exclude=venv,.git,__pycache__,.pytest_cache,mlruns,notebooks,check_db.py,check_mlflow_db.py,data --max-line-length=100

      - name: Run Unit Tests
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pytest --junitxml=test-results.xml --cov=src --cov-report=xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Train Model
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/train_pipeline.py

      - name: Upload Model Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Upload MLflow Database
        if: success() && hashFiles('mlflow.db') != ''
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-database
          path: mlflow.db